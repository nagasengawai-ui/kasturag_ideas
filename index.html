<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>put idea | Share Problems & Ideas</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="put idea - Share your problems, ideas, startup concepts, and technology discussions. Connect with innovators and solve challenges together.">
  <meta name="keywords" content="problems, ideas, startups, technology, discussions, innovation, community">
  <meta name="author" content="Kasturag Tech">
  <meta name="robots" content="index, follow">
  
  <!-- Open Graph Tags -->
  <meta property="og:title" content="put idea">
  <meta property="og:description" content="Share problems, ideas, and solutions with the global tech community">
  <meta property="og:type" content="website">
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f9 100%);
      min-height: 100vh;
      transition: background 0.3s, color 0.2s;
    }
    
    body.dark {
      background: linear-gradient(135deg, #0a0c12 0%, #0f1118 100%);
      color: #eef2ff;
    }
    
    /* Glassmorphism Core */
    .glass-card, nav, .card, .modal-content, .marketing-banner, .brand-badge, .post-card, .profile-card, .comment-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    body.dark .glass-card, body.dark nav, body.dark .card, body.dark .modal-content, 
    body.dark .marketing-banner, body.dark .brand-badge, body.dark .post-card {
      background: rgba(18, 22, 36, 0.92);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }
    
    /* Button Styles */
    .btn-primary {
      background: linear-gradient(135deg, #2D4BFF, #7C3AFF);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(45, 75, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(45, 75, 255, 0.5);
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid #2D4BFF;
      border-radius: 40px;
      padding: 10px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-outline:hover {
      background: #2D4BFF20;
      transform: scale(1.02);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      color: white;
    }
    
    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s;
    }
    
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    
    .modal-content {
      max-width: 650px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      border-radius: 32px;
    }
    
    /* Form Elements */
    input, textarea, select {
      width: 100%;
      padding: 14px 18px;
      margin: 8px 0;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.9);
    }
    
    body.dark input, body.dark textarea, body.dark select {
      background: #1a1e2c;
      border-color: #2d3142;
      color: white;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2D4BFF;
      box-shadow: 0 0 0 3px rgba(45, 75, 255, 0.1);
    }
    
    /* Post Cards */
    .post-card {
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
    }
    
    .post-card:hover {
      transform: translateY(-4px);
    }
    
    .profile-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    /* Notification Bell */
    .notification-bell {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
      background: none;
      border: none;
      padding: 8px;
      color: inherit;
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff4444;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 0.7rem;
      font-weight: bold;
      min-width: 18px;
    }
    
    /* Layout */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      margin: 20px 24px;
      border-radius: 80px;
      flex-wrap: wrap;
      gap: 16px;
      position: sticky;
      top: 10px;
      z-index: 1000;
    }
    
    .logo {
      font-family: 'Space Grotesk', monospace;
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #2D4BFF, #B842FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .grid-posts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
      margin-top: 32px;
    }
    
    .category-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(45, 75, 255, 0.15);
      color: #2D4BFF;
      margin-right: 8px;
    }
    
    body.dark .category-tag {
      background: rgba(45, 75, 255, 0.3);
    }
    
    /* Loading Spinner */
    .loader {
      text-align: center;
      padding: 40px;
      display: none;
    }
    
    .loader.active {
      display: block;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2D4BFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 24px;
      border-radius: 50px;
      background: linear-gradient(135deg, #2D4BFF, #7C3AFF);
      color: white;
      font-weight: 600;
      z-index: 10001;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      nav { margin: 12px; padding: 12px 20px; }
      .grid-posts { grid-template-columns: 1fr; }
      .container { padding: 0 16px; }
      .logo { font-size: 1.3rem; }
    }
    
    /* Comment Threads */
    .comment-item {
      transition: all 0.2s ease;
      animation: fadeInUp 0.3s ease;
      background: rgba(0,0,0,0.03);
      border-radius: 20px;
      margin-bottom: 16px;
      padding: 16px;
    }
    
    body.dark .comment-item { background: rgba(255,255,255,0.03); }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .comment-menu { position: relative; display: inline-block; }
    .menu-trigger {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 50%;
      transition: background 0.2s;
      color: inherit;
    }
    .menu-trigger:hover { background: rgba(0,0,0,0.1); }
    
    .menu-dropdown {
      position: absolute;
      right: 0;
      top: 100%;
      background: rgba(30, 34, 48, 0.98);
      backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 6px 0;
      min-width: 140px;
      z-index: 100;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .menu-dropdown button {
      width: 100%;
      text-align: left;
      padding: 10px 16px;
      background: none;
      border: none;
      color: #eef2ff;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
    }
    
    .menu-dropdown button:hover { background: rgba(255,255,255,0.15); }
    
    .edited-badge { font-size: 0.7rem; color: #888; margin-left: 8px; font-style: italic; }
    .footer { text-align: center; padding: 40px 20px; margin-top: 60px; border-top: 1px solid rgba(0, 0, 0, 0.05); }
    body.dark .footer { border-top-color: rgba(255, 255, 255, 0.05); }
    
    /* Trending badge */
    .trending-badge {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: white;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-left: 12px;
    }
    
    /* Markdown preview */
    .post-content-markdown {
      line-height: 1.6;
    }
    .post-content-markdown pre {
      background: #1e1e2e;
      padding: 12px;
      border-radius: 12px;
      overflow-x: auto;
      color: #e2e8f0;
    }
  </style>
</head>
<body>

<div id="app">
  <nav>
    <div class="logo" style="display:flex;align-items:center;gap:10px;">
      <i class="fas fa-lightbulb" style="font-size: 2rem; background: linear-gradient(135deg, #2D4BFF, #B842FF); -webkit-background-clip: text; background-clip: text; color: transparent;"></i>
      <span>put idea</span>
    </div>
    <div style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
      <button id="homeNavBtn" class="btn-outline"><i class="fas fa-home"></i> Home</button>
      <button id="problemsNavBtn" class="btn-outline"><i class="fas fa-exclamation-triangle"></i> Problems</button>
      <button id="ideasNavBtn" class="btn-outline"><i class="fas fa-brain"></i> Ideas</button>
      <button id="startupsNavBtn" class="btn-outline"><i class="fas fa-rocket"></i> Startups</button>
      <button id="techNavBtn" class="btn-outline"><i class="fas fa-code"></i> Tech</button>
      <button id="aboutNavBtn" class="btn-outline"><i class="fas fa-info-circle"></i> About</button>
      <button id="dashboardNavBtn" class="btn-outline" style="display: none;"><i class="fas fa-chart-line"></i> Dashboard</button>
      <button id="notificationsBtn" class="notification-bell" aria-label="Notifications"><i class="fas fa-bell"></i><span id="notificationBadge" class="notification-badge" style="display: none;">0</span></button>
      <button id="authBtn" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      <button id="themeToggleBtn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"><i class="fas fa-moon"></i></button>
    </div>
  </nav>

  <div class="container">
    <div class="brand-badge" style="background: linear-gradient(95deg, #2D4BFF15, #B842FF15); text-align: center; margin: 8px auto 20px; padding: 12px 24px; border-radius: 60px;">
      <i class="fas fa-shield-alt"></i> <strong>Platform Developed and Maintained by Kasturag Tech</strong> | Enterprise-Grade Security | Share Problems & Ideas
    </div>
  </div>

  <main class="container" id="mainContent"></main>
  <div class="container" id="marketingSection"></div>

  <footer class="footer">
    <p>© 2026 put idea · Developed and Managed by Kasturag Tech · All Rights Reserved.</p>
    <div class="brand-badge" style="display: inline-block; margin-top: 12px; padding: 8px 20px;"><i class="fas fa-crown"></i> Built by Kasturag Tech — Innovating Digital Future</div>
    <div style="margin-top: 16px; display: flex; gap: 20px; justify-content: center;">
      <a href="#" style="color: #2D4BFF; text-decoration: none;"><i class="fas fa-globe"></i> Website</a>
      <a href="mailto:hello@kasturagtech.com" style="color: #2D4BFF; text-decoration: none;"><i class="fas fa-envelope"></i> Email</a>
    </div>
  </footer>
</div>

<script>
  // Supabase Configuration
  const SUPABASE_URL = 'https://gmoguqputgiickghlury.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_wOsMLlLmESUnXpkEeM9rog_B764NhS8';
  
  let supabase;
  let currentUser = null;
  let currentSession = null;
  let currentFilter = 'all';
  let currentView = 'home';
  
  async function initSupabase() {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await supabase.auth.getSession();
    if (session) await loadUserProfile(session.user.id);
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) await loadUserProfile(session.user.id);
      else { currentUser = null; currentSession = null; }
      updateAuthUI();
      renderCurrentView();
    });
    updateAuthUI();
    renderCurrentView();
    renderMarketing();
  }
  
  async function loadUserProfile(userId) {
    const { data } = await supabase.from('profiles').select('*').eq('id', userId).maybeSingle();
    if (data) currentUser = { id: userId, ...data };
    else {
      const { data: newProfile } = await supabase.from('profiles').insert({ id: userId, fullname: 'Innovator', username: `creator_${userId.slice(0,6)}`, join_date: new Date(), bio: 'Passionate problem solver' }).select().maybeSingle();
      currentUser = newProfile;
    }
    updateNotificationBadge();
  }
  
  function sanitizeHTML(str) { return DOMPurify.sanitize(str || '', { ALLOWED_TAGS: ['b','i','em','strong','a','p','br','pre','code'], ALLOWED_ATTR: ['href','target'] }); }
  function showToast(msg, type = 'success') { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
  
  // Enhanced Markdown rendering
  function renderMarkdown(text) { if(typeof marked !== 'undefined') return marked.parse(text || ''); return text; }
  
  // Create Post with rich editor
  async function openCreatePostModal() {
    if (!currentUser) { showToast('Please sign in to share ideas', 'error'); openAuthModal(); return; }
    const modal = document.createElement('div'); modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content"><h2><i class="fas fa-pen-fancy"></i> Share Your Idea/Problem</h2>
      <input type="text" id="postTitle" placeholder="Title *" maxlength="150"><select id="postCategory"><option>Technology</option><option>Startups</option><option>Business Ideas</option><option>AI & ML</option><option>Programming</option><option>Career</option></select>
      <textarea id="postContent" rows="6" placeholder="Describe your problem or idea in detail... Markdown supported"></textarea>
      <div style="display:flex; gap:12px; margin-top:20px;"><button id="submitPostBtn" class="btn-primary">🚀 Publish</button><button id="cancelPostBtn" class="btn-outline">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('submitPostBtn').onclick = async () => {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if(!title) { showToast('Title required', 'error'); return; }
      const { error } = await supabase.from('posts').insert({ title, content, category: document.getElementById('postCategory').value, author_id: currentUser.id, is_draft: false });
      if(error) showToast(error.message, 'error'); else { showToast('Posted!'); modal.remove(); renderCurrentView(); }
    };
    document.getElementById('cancelPostBtn').onclick = () => modal.remove();
  }
  
  async function fetchPosts(filter = 'all') {
    let q = supabase.from('posts').select('*, profiles(fullname, avatar_url)').eq('is_draft', false).order('created_at', { ascending: false }).limit(30);
    if(filter !== 'all') q = q.eq('category', filter);
    const { data } = await q;
    return data || [];
  }
  
async function renderHome() {

  const posts = await fetchPosts(currentFilter);

  const categoryMap = {
    all: 'All',
    Technology: 'Technology',
    Startups: 'Startups',
    'Business Ideas': 'Business',
    'AI & ML': 'AI/ML',
    Programming: 'Coding',
    Career: 'Career'
  };

  const html = `
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin:24px 0;">
    <div>
      <h1 style="font-size:2rem;">
        <i class="fas fa-comments"></i>
        Community Exchange
      </h1>
      <p>Share challenges, unlock solutions</p>
    </div>

    <button id="createPostBtn" class="btn-primary">
      <i class="fas fa-plus-circle"></i>
      New Post
    </button>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin:20px 0;">
    ${Object.entries(categoryMap).map(([key,label]) => `
      <button
        class="filter-btn ${currentFilter === key ? 'btn-primary' : 'btn-outline'}"
        data-filter="${key}"
      >
        ${key === 'all' ? `📌 ${label}` : label}
      </button>
    `).join('')}
  </div>

  <div class="grid-posts" id="postsGrid">

  ${posts.map(post => {

    const isOwner =
      currentUser &&
      currentUser.id === post.author_id;

    const isTrending =
      (post.likes_count || 0) >= 10;

    return `

    <div class="post-card glass-card" data-postid="${post.id}">

      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">

        <div style="display:flex;gap:12px;align-items:center;">

          <img
            src="${
              post.profiles?.avatar_url ||
              `https://ui-avatars.com/api/?background=2D4BFF&color=fff&name=${encodeURIComponent(post.profiles?.fullname || 'User')}`
            }"
            class="profile-img"
          >

          <div>

            <b>${sanitizeHTML(post.profiles?.fullname || 'Anonymous')}</b>

            <div style="margin-top:4px;">

              <span class="category-tag">
                <i class="fas fa-tag"></i>
                ${sanitizeHTML(post.category)}
              </span>

              <small>
                ${new Date(post.created_at).toLocaleDateString()}
              </small>

              ${
                isTrending
                ? `<span class="trending-badge">🔥 Trending</span>`
                : ''
              }

            </div>

          </div>

        </div>

        ${
          isOwner
          ? `
          <div style="display:flex;gap:8px;">

            <button
              class="editPostBtn btn-outline"
              data-id="${post.id}"
              data-title="${encodeURIComponent(post.title)}"
              data-content="${encodeURIComponent(post.content)}"
              data-category="${encodeURIComponent(post.category)}"
            >
              <i class="fas fa-edit"></i>
            </button>

            <button
              class="deletePostBtn btn-danger"
              data-id="${post.id}"
            >
              <i class="fas fa-trash"></i>
            </button>

          </div>
          `
          : ''
        }

      </div>

      <h3 style="margin:14px 0;">
        ${sanitizeHTML(post.title)}
      </h3>

      <div class="post-content-markdown">
        ${sanitizeHTML((post.content || '').substring(0,180))}
        ${(post.content || '').length > 180 ? '...' : ''}
      </div>

      <div
        style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-top:18px;
        padding-top:14px;
        border-top:1px solid rgba(0,0,0,0.08);
        "
      >

        <div style="display:flex;gap:20px;">

          <button class="likeBtn" data-id="${post.id}">
            <i class="far fa-heart"></i>
            <span>${post.likes_count || 0}</span>
          </button>

          <button class="commentBtn" data-id="${post.id}">
            <i class="far fa-comment-dots"></i>
            <span>${post.comments_count || 0}</span>
          </button>

        </div>

        <button class="shareBtn" data-id="${post.id}">
          <i class="fas fa-share-alt"></i>
          Share
        </button>

      </div>

    </div>

    `;

  }).join('')}

  </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  document.querySelectorAll('.commentBtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openCommentModal(btn.dataset.id);
    });
  });

  document.querySelectorAll('.likeBtn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      await toggleLike(btn.dataset.id);
    });
  });

  document.querySelectorAll('.shareBtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(
        `${window.location.origin}?post=${btn.dataset.id}`
      );
      showToast('Link copied!');
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      renderHome();
    });
  });

  document.querySelectorAll('.editPostBtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();

      editPost(
        btn.dataset.id,
        decodeURIComponent(btn.dataset.title),
        decodeURIComponent(btn.dataset.content),
        decodeURIComponent(btn.dataset.category)
      );
    });
  });

  document.querySelectorAll('.deletePostBtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deletePost(btn.dataset.id);
    });
  });

  document
    .getElementById('createPostBtn')
    ?.addEventListener('click', openCreatePostModal);

  document.querySelectorAll('.post-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      openPostDetail(card.dataset.postid);
    });
  });

}
async function deletePost(postId) {

  if(!confirm('Delete this post permanently?')) return;

  const { error } = await supabase
    .from('posts')
    .delete()
    .eq('id', postId);

  if(error) {
    showToast(error.message, 'error');
    return;
  }

  showToast('Post Deleted');
  renderHome();
}
  async function toggleLike(postId) {

  if(!currentUser){
    showToast('Login to like');
    return;
  }

  const { data: existing } = await supabase
    .from('likes')
    .select('id')
    .eq('target_id', postId)
    .eq('target_type', 'post')
    .eq('user_id', currentUser.id)
    .maybeSingle();

  if(existing){
    await supabase
      .from('likes')
      .delete()
      .eq('id', existing.id);
  } else {
    await supabase
      .from('likes')
      .insert({
        target_id: postId,
        target_type: 'post',
        user_id: currentUser.id
      });
  }

  const btn = document.querySelector(
    `.likeBtn[data-id="${postId}"] span`
  );

  if(btn){
    let count = parseInt(btn.textContent) || 0;
    btn.textContent = existing ? count - 1 : count + 1;
  }
}
  async function loadCommentsForDetail(postId) {
    const { data: comments } = await supabase.from('comments').select('*, profiles(fullname, avatar_url), edited_at').eq('post_id', postId).is('parent_id', null).order('created_at', { ascending: false });
    const container = document.getElementById('commentsDetailList');
    if(!container) return;
    container.innerHTML = comments?.map(c => `<div class="comment-item" data-cid="${c.id}"><div style="display:flex;justify-content:space-between;"><div><img src="${c.profiles?.avatar_url||`https://ui-avatars.com/api/?name=${c.profiles?.fullname}`}" style="width:32px;height:32px;border-radius:50%;"><b>${c.profiles?.fullname}</b> <small>${new Date(c.created_at).toLocaleString()}</small>${c.edited_at?' <i class="fas fa-edit" style="font-size:12px;"></i>':''}</div>${currentUser && (currentUser.id===c.user_id) ? `<button class="menu-trigger-comment" data-id="${c.id}" data-content="${sanitizeHTML(c.content)}">⋮</button>` : ''}</div><p>${sanitizeHTML(c.content)}</p></div>`).join('') || '<div class="glass-card" style="padding:20px;">No comments yet. Be the first!</div>';
    document.querySelectorAll('.menu-trigger-comment').forEach(btn => btn.addEventListener('click', async (e) => { e.stopPropagation(); const cid = btn.dataset.id, old = btn.dataset.content; const newC = prompt('Edit comment:', old); if(newC && newC.trim()) await supabase.from('comments').update({ content: newC, edited_at: new Date() }).eq('id', cid); loadCommentsForDetail(postId); }));
  }
  
  async function addComment(postId, content, parentId=null, refreshModal=true) {
    if(!currentUser) { showToast('Login to comment'); openAuthModal(); return; }
    const { error } = await supabase.from('comments').insert({ post_id: postId, user_id: currentUser.id, content: sanitizeHTML(content), parent_id: parentId });
    if(!error) { await supabase.rpc('increment_post_comments', { post_id: postId }); showToast('Comment added'); if(refreshModal) loadCommentsForDetail(postId); else renderHome(); }
    else showToast(error.message, 'error');
  }

async function editPost(
  postId,
  oldTitle,
  oldContent,
  oldCategory
) {

  const modal = document.createElement('div');
  modal.className = 'modal active';

  modal.innerHTML = `
  <div class="modal-content">

    <h2>Edit Post</h2>

    <input
      id="editTitle"
      value="${oldTitle}"
    >

    <select id="editCategory">
      <option ${oldCategory==='Technology'?'selected':''}>
      Technology
      </option>

      <option ${oldCategory==='Startups'?'selected':''}>
      Startups
      </option>

      <option ${oldCategory==='Business Ideas'?'selected':''}>
      Business Ideas
      </option>

      <option ${oldCategory==='AI & ML'?'selected':''}>
      AI & ML
      </option>

      <option ${oldCategory==='Programming'?'selected':''}>
      Programming
      </option>

      <option ${oldCategory==='Career'?'selected':''}>
      Career
      </option>
    </select>

    <textarea
      id="editContent"
      rows="6"
    >${oldContent}</textarea>

    <div style="display:flex;gap:10px;margin-top:20px;">
      <button id="saveEditBtn" class="btn-primary">
        Save
      </button>

      <button id="closeEditBtn" class="btn-outline">
        Cancel
      </button>
    </div>

  </div>
  `;

  document.body.appendChild(modal);

  document.getElementById('closeEditBtn').onclick =
    () => modal.remove();

  document.getElementById('saveEditBtn').onclick =
  async () => {

    const title =
      document.getElementById('editTitle').value;

    const content =
      document.getElementById('editContent').value;

    const category =
      document.getElementById('editCategory').value;

    const { error } = await supabase
      .from('posts')
      .update({
        title,
        content,
        category,
        updated_at: new Date()
      })
      .eq('id', postId);

    if(error){
      showToast(error.message,'error');
      return;
    }

    showToast('Post Updated');
    modal.remove();
    renderHome();
  };
}
  
  async function openCommentModal(postId) { openPostDetail(postId); }
  
  function updateAuthUI() { 
    const authBtn = document.getElementById('authBtn'); 
    if(currentUser) { authBtn.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.fullname?.split(' ')[0]}`; document.getElementById('dashboardNavBtn').style.display = 'inline-block'; } 
    else { authBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; document.getElementById('dashboardNavBtn').style.display = 'none'; } 
  }
  
  function renderMarketing() { document.getElementById('marketingSection').innerHTML = `<div class="marketing-banner glass-card" style="padding:32px;text-align:center;"><i class="fas fa-chart-line" style="font-size:2rem;"></i><h3>🚀 Kasturag Tech Enterprise Solutions</h3><button class="btn-primary" onclick="alert('📧 kasturagtech@gmail.com | Let\'s innovate together')"><i class="fas fa-envelope"></i> Contact Us</button></div>`; }
  function renderAbout() { document.getElementById('mainContent').innerHTML = `<div class="glass-card" style="padding:48px;"><h1><i class="fas fa-building"></i> About Kasturag Tech</h1><p>We build next-gen digital ecosystems. Our mission is to empower innovators, problem solvers, and entrepreneurs.</p><i class="fas fa-check-circle"></i> Trusted by 500+ startups<br><i class="fas fa-shield-alt"></i> Enterprise security & AI-driven insights</div>`; }
async function renderDashboard() {

  if (!currentUser) return;

  const { count: totalPosts } = await supabase
    .from('posts')
    .select('*', { count: 'exact', head: true })
    .eq('author_id', currentUser.id);

  const { data: myPosts } = await supabase
    .from('posts')
    .select('*')
    .eq('author_id', currentUser.id)
    .order('created_at', { ascending: false });

  const totalLikes = myPosts?.reduce(
    (sum, post) => sum + (post.likes_count || 0),
    0
  ) || 0;

  const totalComments = myPosts?.reduce(
    (sum, post) => sum + (post.comments_count || 0),
    0
  ) || 0;

  const trendingPosts = myPosts?.filter(
    p => (p.likes_count || 0) >= 10
  ).length || 0;

  document.getElementById('mainContent').innerHTML = `

  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:25px;">
      <div>
          <h1>
              <i class="fas fa-chart-line"></i>
              Creator Dashboard
          </h1>
          <p>Manage your ideas and community engagement</p>
      </div>

      <button
        class="btn-primary"
        onclick="openCreatePostModal()"
      >
        <i class="fas fa-plus-circle"></i>
        New Post
      </button>
  </div>

  <div class="grid-posts">

      <div class="glass-card" style="padding:25px;text-align:center;">
          <h2>${totalPosts}</h2>
          <p>📝 Total Posts</p>
      </div>

      <div class="glass-card" style="padding:25px;text-align:center;">
          <h2>${totalLikes}</h2>
          <p>❤️ Total Likes</p>
      </div>

      <div class="glass-card" style="padding:25px;text-align:center;">
          <h2>${totalComments}</h2>
          <p>💬 Total Comments</p>
      </div>

      <div class="glass-card" style="padding:25px;text-align:center;">
          <h2>${trendingPosts}</h2>
          <p>🔥 Trending Posts</p>
      </div>

  </div>

  <div
    class="glass-card"
    style="padding:25px;margin-top:25px;"
  >

      <h2>
        <i class="fas fa-user-circle"></i>
        Profile Overview
      </h2>

      <br>

      <p>
        <strong>Name:</strong>
        ${sanitizeHTML(currentUser.fullname || 'User')}
      </p>

      <p>
        <strong>Username:</strong>
        ${sanitizeHTML(currentUser.username || '-')}
      </p>

      <p>
        <strong>Bio:</strong>
        ${sanitizeHTML(currentUser.bio || 'No bio added')}
      </p>

  </div>

  <div
    class="glass-card"
    style="padding:25px;margin-top:25px;"
  >

      <h2>
        <i class="fas fa-clock"></i>
        Recent Posts
      </h2>

      <br>

      ${
        myPosts?.length
          ? myPosts.slice(0, 5).map(post => `
              <div
                style="
                  padding:15px;
                  margin-bottom:10px;
                  border-bottom:1px solid rgba(0,0,0,0.08);
                "
              >

                <h3>${sanitizeHTML(post.title)}</h3>

                <small>
                  ${new Date(post.created_at).toLocaleDateString()}
                </small>

                <br><br>

                ❤️ ${post.likes_count || 0}
                &nbsp;&nbsp;
                💬 ${post.comments_count || 0}

              </div>
            `).join('')
          : '<p>No posts yet.</p>'
      }

  </div>

  `;
}  function renderCurrentView() { if(currentView === 'home') renderHome(); else if(currentView === 'about') renderAbout(); else if(currentView === 'dashboard') renderDashboard(); }
  function openAuthModal() { alert('🔐 Sign in with Google/Email (Supabase Auth integrated). Contact admin for credentials.'); }
  async function updateNotificationBadge() { if(!currentUser) return; const { count } = await supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', currentUser.id).eq('read', false); const badge = document.getElementById('notificationBadge'); if(count>0) { badge.textContent = count; badge.style.display = 'inline-block'; } else badge.style.display = 'none'; }
  
  document.getElementById('homeNavBtn').addEventListener('click', () => { currentView = 'home'; renderCurrentView(); });
  document.getElementById('problemsNavBtn').addEventListener('click', () => { currentFilter = 'Problems'; currentView = 'home'; renderCurrentView(); });
  document.getElementById('ideasNavBtn').addEventListener('click', () => { currentFilter = 'Ideas'; currentView = 'home'; renderCurrentView(); });
  document.getElementById('startupsNavBtn').addEventListener('click', () => { currentFilter = 'Startups'; currentView = 'home'; renderCurrentView(); });
  document.getElementById('techNavBtn').addEventListener('click', () => { currentFilter = 'Technology'; currentView = 'home'; renderCurrentView(); });
  document.getElementById('aboutNavBtn').addEventListener('click', () => { currentView = 'about'; renderCurrentView(); });
  document.getElementById('dashboardNavBtn').addEventListener('click', () => { if(currentUser) { currentView = 'dashboard'; renderCurrentView(); } else openAuthModal(); });
  document.getElementById('authBtn').addEventListener('click', () => { if(currentUser) supabase.auth.signOut(); else openAuthModal(); });
  document.getElementById('themeToggleBtn').addEventListener('click', () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); });
  if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  document.getElementById('notificationsBtn')?.addEventListener('click', () => { showToast('🔔 Notifications coming soon: real-time alerts'); });
  
  initSupabase();
</script>
