    .footer { text-align: center; padding: 40px 20px; margin-top: 60px; border-top: 1px solid rgba(0, 0, 0, 0.05); }

    .post-content-markdown { line-height: 1.6; word-break: break-word; }

<script>
  const SUPABASE_URL = 'https://gmoguqputgiickghlury.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_wOsMLlLmESUnXpkEeM9rog_B764NhS8';
  
  let supabase;
  let currentUser = null;
  let currentFilter = 'all';
  let currentView = 'home';
  
  async function initSupabase() {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data: { session } } = await supabase.auth.getSession();
    
    // FIX #1: Ensure currentUser is set from auth session immediately
    if (session && session.user) {
      console.log('[INIT] Auth session found. Auth user ID:', session.user.id);
      await loadUserProfile(session.user.id);
    }
    
    supabase.auth.onAuthStateChange(async (event, session) => {
      console.log('[AUTH] State changed. Event:', event, 'Session:', session?.user?.id || 'none');
      if (session && session.user) {
        await loadUserProfile(session.user.id);
      } else {
        currentUser = null;
      }
      updateAuthUI();
      renderCurrentView();
    });
    
    updateAuthUI();
    renderCurrentView();
    renderMarketing();
  }
  
  // FIX #2: Enhanced loadUserProfile with defensive checks and logging
  async function loadUserProfile(userId) {
    if (!userId) {
      console.warn('[PROFILE] userId is null/undefined');
      currentUser = null;
      return;
    }
    
    console.log('[PROFILE] Loading profile for auth user ID:', userId);
    
    const { data: existingProfile, error: fetchError } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .maybeSingle();
    
    if (fetchError) {
      console.error('[PROFILE] Error fetching profile:', fetchError);
    }
    
    if (existingProfile) {
      currentUser = { id: userId, ...existingProfile };
      console.log('[PROFILE] Profile loaded. Current user:', {
        id: currentUser.id,
        fullname: currentUser.fullname,
        username: currentUser.username
      });
    } else {
      console.log('[PROFILE] Profile not found, creating new profile for user:', userId);
      const { data: newProfile, error: insertError } = await supabase
        .from('profiles')
        .insert({
          id: userId,
          fullname: 'Innovator',
          username: `creator_${userId.slice(0, 6)}`,
          join_date: new Date(),
          bio: 'Passionate problem solver'
        })
        .select()
        .maybeSingle();
      
      if (insertError) {
        console.error('[PROFILE] Error creating profile:', insertError);
        currentUser = null;
      } else {
        currentUser = newProfile;
        console.log('[PROFILE] New profile created:', {
          id: currentUser.id,
          fullname: currentUser.fullname,
          username: currentUser.username
        });
      }
    }
  }
  
  function sanitizeHTML(str) { 
    return DOMPurify.sanitize(str || '', { 
      ALLOWED_TAGS: ['b','i','em','strong','a','p','br','pre','code','ul','li','ol'], 
      ALLOWED_ATTR: ['href','target'] 
    }); 
  }
  
  function showToast(msg, type = 'success') { 
    const toast = document.createElement('div'); 
    toast.className = 'toast'; 
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${msg}`; 
    document.body.appendChild(toast); 
    setTimeout(() => toast.remove(), 3000); 
  }
  
  // ============ POST CREATE ============
  async function openCreatePostModal() {
    if (!currentUser) { 
      showToast('Please sign in', 'error'); 
      openAuthModal(); 
      return; 
    }
    const modal = document.createElement('div'); 
    modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content"><h2><i class="fas fa-pen-fancy"></i> Share Your Idea</h2>
      <input type="text" id="postTitle" placeholder="Title *" maxlength="150">
      <select id="postCategory"><option>Technology</option><option>Startups</option><option>Business Ideas</option><option>AI & ML</option><option>Programming</option><option>Career</option><option>Problems</option><option>Ideas</option></select>
      <textarea id="postContent" rows="6" placeholder="Describe in detail... Markdown supported"></textarea>
      <div style="display:flex; gap:12px; margin-top:20px;"><button id="submitPostBtn" class="btn-primary"><i class="fas fa-paper-plane"></i> Publish</button><button id="cancelPostBtn" class="btn-outline">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('submitPostBtn').onclick = async () => {
      const title = document.getElementById('postTitle').value.trim();
      const content = document.getElementById('postContent').value.trim();
      if(!title) { 
        showToast('Title required', 'error'); 
        return; 
      }
      const { error } = await supabase.from('posts').insert({ 
        title, 
        content, 
        category: document.getElementById('postCategory').value, 
        author_id: currentUser.id,
        is_draft: false 
      });
      if(error) {
        console.error('[POST CREATE] Error:', error);
        showToast(error.message, 'error'); 
      } else { 
        showToast('Posted!'); 
        modal.remove(); 
        renderCurrentView(); 
      }
    };
    document.getElementById('cancelPostBtn').onclick = () => modal.remove();
  }
  
  // ============ EDIT POST ============
  async function editPost(postId, oldTitle, oldContent, oldCategory) {
    if (!currentUser) { 
      showToast('Login required', 'error'); 
      return; 
    }
    
    console.log('[EDIT POST] Starting edit. Current user ID:', currentUser.id);
    
    const modal = document.createElement('div'); 
    modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content"><h2><i class="fas fa-edit"></i> Edit Post</h2>
      <input id="editTitle" value="${sanitizeHTML(oldTitle)}">
      <select id="editCategory">
        <option ${oldCategory==='Technology'?'selected':''}>Technology</option>
        <option ${oldCategory==='Startups'?'selected':''}>Startups</option>
        <option ${oldCategory==='Business Ideas'?'selected':''}>Business Ideas</option>
        <option ${oldCategory==='AI & ML'?'selected':''}>AI & ML</option>
        <option ${oldCategory==='Programming'?'selected':''}>Programming</option>
        <option ${oldCategory==='Career'?'selected':''}>Career</option>
      </select>
      <textarea id="editContent" rows="6">${sanitizeHTML(oldContent)}</textarea>
      <div style="display:flex;gap:10px;margin-top:20px;"><button id="saveEditBtn" class="btn-success"><i class="fas fa-check"></i> Save Changes</button><button id="closeEditBtn" class="btn-outline">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    
    document.getElementById('closeEditBtn').onclick = () => modal.remove();
    document.getElementById('saveEditBtn').onclick = async () => {
      const title = document.getElementById('editTitle').value;
      const content = document.getElementById('editContent').value;
      const category = document.getElementById('editCategory').value;
      
      console.log('[EDIT POST] Saving. Post ID:', postId, 'Author ID:', currentUser.id);
      
      const { error } = await supabase.from('posts').update({ 
        title, 
        content, 
        category, 
        updated_at: new Date() 
      }).eq('id', postId).eq('author_id', currentUser.id);
      
      if(error){
        console.error('[EDIT POST] Error:', error);
        showToast(error.message,'error'); 
        return; 
      }
      showToast('✏️ Post updated successfully');
      modal.remove();
      renderCurrentView();
    };
  }
  
  // ============ DELETE POST ============
  async function deletePost(postId) {
    if(!currentUser) {
      console.warn('[DELETE POST] No current user');
      return;
    }
    
    const confirmed = confirm('⚠️ Delete this post permanently? This cannot be undone.');
    if(!confirmed) return;
    
    console.log('[DELETE POST] Deleting. Post ID:', postId, 'Author ID:', currentUser.id);
    
    const { error } = await supabase.from('posts').delete().eq('id', postId).eq('author_id', currentUser.id);
    if(error){
      console.error('[DELETE POST] Error:', error);
      showToast(error.message,'error'); 
      return; 
    }
    showToast('🗑️ Post deleted');
    renderCurrentView();
  }
  
  // ============ EDIT COMMENT ============
  async function editComment(commentId, currentContent) {
    if (!currentUser) { 
      showToast('Login required', 'error'); 
      return; 
    }
    
    console.log('[EDIT COMMENT] Starting edit. Current user ID:', currentUser.id);
    
    const modal = document.createElement('div'); 
    modal.className = 'modal active';
    modal.innerHTML = `<div class="modal-content"><h2><i class="fas fa-edit"></i> Edit Comment</h2>
      <textarea id="editCommentText" rows="4">${sanitizeHTML(currentContent)}</textarea>
      <div style="display:flex;gap:10px;margin-top:20px;"><button id="saveCommentBtn" class="btn-success"><i class="fas fa-check"></i> Save</button><button id="cancelCommentBtn" class="btn-outline">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    
    document.getElementById('cancelCommentBtn').onclick = () => modal.remove();
    document.getElementById('saveCommentBtn').onclick = async () => {
      const newContent = document.getElementById('editCommentText').value.trim();
      if (!newContent) { 
        showToast('Comment cannot be empty', 'error'); 
        return; 
      }
      
      console.log('[EDIT COMMENT] Saving. Comment ID:', commentId, 'User ID:', currentUser.id);
      
      const { error } = await supabase.from('comments').update({ 
        content: sanitizeHTML(newContent), 
        edited_at: new Date() 
      }).eq('id', commentId).eq('user_id', currentUser.id);
      
      if(error) {
        console.error('[EDIT COMMENT] Error:', error);
        showToast(error.message, 'error');
      } else { 
        showToast('✏️ Comment updated'); 
        modal.remove(); 
        renderCurrentView(); 
      }
    };
  }
  
  // ============ DELETE COMMENT ============
  async function deleteComment(commentId, postId) {
    if(!currentUser) {
      console.warn('[DELETE COMMENT] No current user');
      return;
    }
    
    const confirmed = confirm('⚠️ Delete this comment permanently?');
    if(!confirmed) return;
    
    console.log('[DELETE COMMENT] Deleting. Comment ID:', commentId, 'User ID:', currentUser.id);
    
    const { error } = await supabase.from('comments').delete().eq('id', commentId).eq('user_id', currentUser.id);
    if(error) {
      console.error('[DELETE COMMENT] Error:', error);
      showToast(error.message, 'error');
    } else {
      try {
        await supabase.rpc('increment_post_comments', { post_id: postId, inc_amount: -1 });
      } catch(e) { 
        console.warn('[DELETE COMMENT] RPC error:', e); 
      }
      showToast('🗑️ Comment deleted');
      renderCurrentView();
    }
  }
  
  // FIX #3: Enhanced fetchPosts with author_id explicitly selected
  async function fetchPosts(filter = 'all') {
    let q = supabase
      .from('posts')
      .select('id, title, content, category, author_id, created_at, updated_at, likes_count, comments_count, is_draft, profiles(fullname, avatar_url)')
      .eq('is_draft', false)
      .order('created_at', { ascending: false })
      .limit(30);
    
    if(filter !== 'all' && filter !== 'Problems' && filter !== 'Ideas') {
      q = q.eq('category', filter);
    }
    if(filter === 'Problems') {
      q = q.ilike('category', '%Problem%');
    }
    if(filter === 'Ideas') {
      q = q.ilike('category', '%Idea%');
    }
    
    const { data, error } = await q;
    
    if (error) {
      console.error('[FETCH POSTS] Error:', error);
      return [];
    }
    
    console.log('[FETCH POSTS] Filter:', filter, 'Count:', data?.length || 0);
    if (data && data.length > 0) {
      console.log('[FETCH POSTS] Sample post:', {
        id: data[0].id,
        title: data[0].title,
        author_id: data[0].author_id,
        author_id_type: typeof data[0].author_id
      });
    }
    
    return data || [];
  }
  
  async function toggleLike(postId) {
    if(!currentUser){ 
      showToast('Login to like', 'error'); 
      openAuthModal(); 
      return; 
    }
    
    const { data: existing } = await supabase
      .from('likes')
      .select('id')
      .eq('target_id', postId)
      .eq('target_type', 'post')
      .eq('user_id', currentUser.id)
      .maybeSingle();
    
    if(existing) {
      await supabase.from('likes').delete().eq('id', existing.id);
    } else {
      await supabase.from('likes').insert({ 
        target_id: postId, 
        target_type: 'post', 
        user_id: currentUser.id 
      });
    }
    renderHome();
  }
  
  async function addComment(postId, content) {
    if(!currentUser) { 
      showToast('Login to comment', 'error'); 
      openAuthModal(); 
      return; 
    }
    if(!content.trim()) return;
    
    console.log('[ADD COMMENT] Adding comment to post:', postId, 'User ID:', currentUser.id);
    
    const { error } = await supabase.from('comments').insert({ 
      post_id: postId, 
      user_id: currentUser.id, 
      content: sanitizeHTML(content), 
      parent_id: null 
    });
    
    if(!error) { 
      await supabase.rpc('increment_post_comments', { post_id: postId });
      showToast('💬 Comment added');
      renderHome();
    } else {
      console.error('[ADD COMMENT] Error:', error);
      showToast(error.message, 'error');
    }
  }
  
  // FIX #4: Enhanced renderHome with defensive ownership checks and logging
  async function renderHome() {
    console.log('[RENDER HOME] Starting. Current user:', currentUser?.id || 'none');
    
    const posts = await fetchPosts(currentFilter);
    const categoryMap = { 
      all:'All',

      Startups:'Startups',

      Programming:'Code', 
      Career:'Career',

    let html = `<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin:24px 0;">

      <div class="grid-posts">`;
    
    for (const post of posts) {
      // FIX #5: Defensive null checks for ownership comparison
      const isOwner = !!(
        currentUser && 
        currentUser.id && 
        post && 
        post.author_id && 
        String(currentUser.id) === String(post.author_id)
      );
      
      console.log('[RENDER HOME] Post check:', {
        postId: post?.id,
        postAuthorId: post?.author_id,
        currentUserId: currentUser?.id,
        isOwner,
        typesMatch: typeof currentUser?.id === typeof post?.author_id
      });
      
      const isTrending = (post.likes_count || 0) >= 5;
      
      // FIX #6: Enhanced comment fetch with user_id explicitly selected
      const { data: comments, error: commentsError } = await supabase
        .from('comments')
        .select('id, content, user_id, created_at, edited_at, post_id, profiles(fullname, avatar_url)')
        .eq('post_id', post.id)
        .is('parent_id', null)
        .order('created_at', { ascending: true });
      
      if (commentsError) {
        console.error('[RENDER HOME] Comments fetch error:', commentsError);
      }
      
      const commentsArray = comments || [];
      
      html += `<div class="post-card glass-card" data-postid="${post.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="display:flex;gap:12px;align-items:center;">
            <img src="${post.profiles?.avatar_url || `https://ui-avatars.com/api/?background=2D4BFF&color=fff&name=${encodeURIComponent(post.profiles?.fullname || 'User')}`}" class="profile-img">
            <div><b>${sanitizeHTML(post.profiles?.fullname || 'Anonymous')}</b>
              <div><span class="category-tag"><i class="fas fa-tag"></i> ${post.category}</span><small> ${new Date(post.created_at).toLocaleDateString()}</small>${isTrending ? `<span class="trending-badge">🔥 Trending</span>` : ''}</div>
            </div>
          </div>
          ${isOwner ? `<div class="post-header-actions">
            <button class="editPostBtn btn-outline btn-sm" data-id="${post.id}" data-title="${encodeURIComponent(post.title)}" data-content="${encodeURIComponent(post.content||'')}" data-category="${encodeURIComponent(post.category||'')}"><i class="fas fa-edit"></i> Edit</button>
            <button class="deletePostBtn btn-danger btn-sm" data-id="${post.id}"><i class="fas fa-trash"></i> Delete</button>
          </div>` : ''}
        </div>
        <h3 style="margin:14px 0;">${sanitizeHTML(post.title)}</h3>
        <div class="post-content-markdown">${marked.parse((post.content || '').substring(0,200))}${(post.content || '').length > 200 ? '...' : ''}</div>
        
        <!-- Comments Section -->
        <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.1);">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;">
            <span><i class="fas fa-comments"></i> Comments (${post.comments_count || 0})</span>
            <button class="addCommentBtn btn-success btn-sm" data-id="${post.id}"><i class="fas fa-reply"></i> Add Comment</button>
          </div>
          <div id="comments-${post.id}" class="comments-container" style="max-height: 300px; overflow-y: auto;">
            ${commentsArray.length ? commentsArray.map(c => {
              // FIX #7: Defensive null checks for comment ownership
              const isCommentOwner = !!(
                currentUser && 
                currentUser.id && 
                c && 
                c.user_id && 
                String(currentUser.id) === String(c.user_id)
              );
              
              console.log('[RENDER HOME] Comment check:', {
                commentId: c?.id,
                commentUserId: c?.user_id,
                currentUserId: currentUser?.id,
                isCommentOwner,
                typesMatch: typeof currentUser?.id === typeof c?.user_id
              });
              
              return `
              <div class="comment-item" style="margin-bottom: 12px; padding: 12px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                  <div>
                    <img src="${c.profiles?.avatar_url || `https://ui-avatars.com/api/?name=${c.profiles?.fullname}`}" style="width:28px;height:28px;border-radius:50%;margin-right:8px;vertical-align:middle;">
                    <b>${c.profiles?.fullname}</b>
                    <small>${new Date(c.created_at).toLocaleString()}</small>
                    ${c.edited_at ? `<span class="edited-badge"><i class="fas fa-edit"></i> edited</span>` : ''}
                  </div>
                  ${isCommentOwner ? `
                    <div class="comment-actions">
                      <button class="editCommentBtn btn-outline btn-sm" data-id="${c.id}" data-content="${sanitizeHTML(c.content)}"><i class="fas fa-edit"></i> Edit</button>
                      <button class="deleteCommentBtn btn-danger btn-sm" data-id="${c.id}" data-postid="${post.id}"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                  ` : ''}
                </div>
                <p style="margin-top: 8px;">${sanitizeHTML(c.content)}</p>
              </div>
            `;
            }).join('') : '<div style="padding: 12px; text-align: center; color: #888;">No comments yet. Be the first!</div>'}
          </div>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top: 12px;">
          <div style="display:flex; gap:20px;">
            <button class="likeBtn" data-id="${post.id}"><i class="far fa-heart"></i> <span>${post.likes_count || 0}</span></button>
            <button class="shareBtn" data-id="${post.id}"><i class="fas fa-share-alt"></i> Share</button>
          </div>
        </div>
      </div>`;
    }
    
    html += posts.length === 0 ? '<div class="glass-card" style="padding:60px;text-align:center;">✨ No posts yet. Be the first!</div>' : '';
    html += `</div>`;
    document.getElementById('mainContent').innerHTML = html;
    
    // Attach event listeners
    document.querySelectorAll('.likeBtn').forEach(btn => btn.addEventListener('click', async e => { 
      e.stopPropagation(); 
      await toggleLike(btn.dataset.id); 
    }));
    
    document.querySelectorAll('.shareBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      navigator.clipboard.writeText(window.location.origin); 
      showToast('Link copied!'); 
    }));
    
    document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { 
      currentFilter = btn.dataset.filter; 
      renderHome(); 
    }));
    
    document.querySelectorAll('.editPostBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      editPost(btn.dataset.id, decodeURIComponent(btn.dataset.title), decodeURIComponent(btn.dataset.content), decodeURIComponent(btn.dataset.category)); 
    }));
    
    document.querySelectorAll('.deletePostBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      deletePost(btn.dataset.id); 
    }));
    
    document.querySelectorAll('.addCommentBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      const comment = prompt('Write your comment/solution:'); 
      if(comment) addComment(btn.dataset.id, comment); 
    }));
    
    document.querySelectorAll('.editCommentBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      editComment(btn.dataset.id, btn.dataset.content); 
    }));
    
    document.querySelectorAll('.deleteCommentBtn').forEach(btn => btn.addEventListener('click', e => { 
      e.stopPropagation(); 
      deleteComment(btn.dataset.id, btn.dataset.postid); 
    }));
    
    document.getElementById('createPostBtn')?.addEventListener('click', openCreatePostModal);
  }

      .from('posts')
      .select('*', { count: 'exact', head: true })
