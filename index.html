  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f9 100%);
      min-height: 100vh;
    }
    
    body.dark {
      background: linear-gradient(135deg, #0a0c12 0%, #0f1118 100%);
      color: #eef2ff;
    }
    
    /* Glassmorphism Core */
    .glass-card, nav, .card, .modal-content, .marketing-banner, .brand-badge, .post-card, .profile-card, .comment-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    body.dark .glass-card, body.dark nav, body.dark .card, body.dark .modal-content, 
    body.dark .marketing-banner, body.dark .brand-badge, body.dark .post-card {
      background: rgba(18, 22, 36, 0.92);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }
    
    /* Button Styles */
    .btn-primary {
      background: linear-gradient(135deg, #2D4BFF, #7C3AFF);
      border: none;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(45, 75, 255, 0.4);
    }
    
    .btn-outline {
      background: transparent;
      border: 2px solid #2D4BFF;
      border-radius: 40px;
      padding: 10px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-outline:hover {
      background: #2D4BFF20;
      transform: scale(1.02);
    }
    
    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
 backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s;
    }
    
    .modal.active {
      visibility: visible;
      opacity: 1;
    }
    
    .modal-content {
      max-width: 600px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px;
      border-radius: 32px;
    }
    
    /* Form Elements */
    input, textarea, select {
      width: 100%;
      padding: 14px 18px;
      margin: 8px 0;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.9);
    }
    
    body.dark input, body.dark textarea, body.dark select {
      background: #1a1e2c;
      border-color: #2d3142;
      color: white;
    }
    
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2D4BFF;
      box-shadow: 0 0 0 3px rgba(45, 75, 255, 0.1);
    }
    
    /* Post Cards */
    .post-card {
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .post-card:hover {
      transform: translateY(-4px);
    }
    
    .profile-img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    /* Notification Badge */
    .notification-bell {
      position: relative;
      cursor: pointer;
      font-size: 1.5rem;
      background: none;
      border: none;
      padding: 8px;
    }
    
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ff4444;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    
    /* Grid Layouts */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      margin: 20px 24px;
      border-radius: 80px;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .logo {
      font-family: 'Space Grotesk', monospace;
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #2D4BFF, #B842FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .grid-posts {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 28px;
      margin-top: 32px;
    }
    
    /* Category Tags */
    .category-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(45, 75, 255, 0.1);
      color: #2D4BFF;
      margin-right: 8px;
    }
    
    /* Loading Spinner */
    .loader {
      text-align: center;
      padding: 40px;
      display: none;
    }
    
    .loader.active {
      display: block;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2D4BFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Toast Notifications */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 24px;
      border-radius: 50px;
      background: linear-gradient(135deg, #2D4BFF, #7C3AFF);
      color: white;
      font-weight: 600;
      z-index: 10001;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      nav {
        margin: 12px;
        padding: 12px 20px;
      }
      
      .grid-posts {
        grid-template-columns: 1fr;
        gap: 20px;
      }
      
      .container {
        padding: 0 16px;
      }
      
      .logo {
        font-size: 1.3rem;
      }
    }
    
    /* Image Preview */
    .image-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    
    .image-preview-grid img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
    }
    
    /* Comment Threads */
    .comment-thread {
      margin-left: 48px;
      border-left: 2px solid #2D4BFF20;
      padding-left: 16px;
    }
    
    .footer {
      text-align: center;
      padding: 40px 20px;
      margin-top: 60px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    body.dark .footer {
      border-top-color: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>

<script>
  // ==================== SUPABASE CONFIGURATION ====================
  const SUPABASE_URL = 'https://gmoguqputgiickghlury.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_wOsMLlLmESUnXpkEeM9rog_B764NhS8';
  
 // const supabase;
  let currentUser = null;
  let currentSession = null;
  let currentFilter = 'all';
  let notificationSubscription = null;
  
  // Initialize Supabase
  async function initSupabase() {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("✅ Supabase connected");
    
    // Check auth session
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      currentSession = session;
      await loadUserProfile(session.user.id);
    }
    
    // Listen for auth changes
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        currentSession = session;
        await loadUserProfile(session.user.id);
      } else {
        currentUser = null;
        currentSession = null;
      }
      updateAuthUI();
      renderCurrentView();
    });
    
    updateAuthUI();
    renderCurrentView();
    renderMarketing();
  }
  
  async function loadUserProfile(userId) {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', userId)
      .maybeSingle();
    
    if (data && !error) {
      currentUser = { id: userId, ...data };
    } else if (!error) {
      // Create profile if not exists
      const { data: newProfile } = await supabase
        .from('profiles')
        .insert({ 
          id: userId, 
          fullname: 'User', 
          username: `user_${userId.slice(0, 8)}`, 
          join_date: new Date(),
          bio: 'Passionate about technology and innovation'
        })
        .select()
        .maybeSingle();
      currentUser = newProfile;
    }
    updateNotificationBadge();
  }
  
  // XSS Protection
  function sanitizeHTML(str) {
    if (!str) return '';
    return DOMPurify.sanitize(str, { 
      ALLOWED_TAGS: ['b', 'i', 'em', 'strong', 'a', 'p', 'br'],
      ALLOWED_ATTR: ['href', 'target', 'rel']
    });
  }
  
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  // Authentication Functions
  async function signUp(email, password, fullname, username) {
    const { data, error } = await supabase.auth.signUp({ 
      email, password, 
      options: { 
        data: { fullname, username },
        emailRedirectTo: window.location.origin
      }
    });
    if (error) throw error;
    showToast('Verification email sent! Please check your inbox.');
    return data;
  }
  
  async function signIn(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    showToast('Welcome back!');
    return data;
  }
  
  async function signOut() {
    await supabase.auth.signOut();
    currentUser = null;
    showToast('Logged out successfully');
    updateAuthUI();
    renderCurrentView();
  }
  
  // Create Post
  async function createPost(title, content, category, tags, images = [], problemType = null) {
    if (!currentUser) throw new Error("Please login first");
    
    const imageUrls = [];
    for (const image of images) {
      const fileExt = image.name.split('.').pop();
      const fileName = `${currentUser.id}/${Date.now()}_${Math.random()}.${fileExt}`;
      const { error } = await supabase.storage.from('post-images').upload(fileName, image);
      if (!error) {
        const { data: { publicUrl } } = supabase.storage.from('post-images').getPublicUrl(fileName);
        imageUrls.push(publicUrl);
      }
    }
    
    const { data, error } = await supabase
      .from('posts')
      .insert({
        title: sanitizeHTML(title),
        content: sanitizeHTML(content),
        category,
        tags: tags.split(',').map(t => t.trim()),
        images: imageUrls,
        author_id: currentUser.id,
        likes_count: 0,
        comments_count: 0,
        problem_type: problemType
      })
      .select();
    
    if (error) throw error;
    showToast('Post published successfully!');
    return data;
  }
  
  // Like Post
  async function toggleLike(postId) {
    if (!currentUser) {
      showToast('Please login to like posts', 'error');
      return;
    }
    
    const { data: existing } = await supabase
      .from('likes')
      .select()
      .eq('post_id', postId)
      .eq('user_id', currentUser.id)
      .maybeSingle();
    
    if (existing) {
      await supabase.from('likes').delete().eq('id', existing.id);
    } else {
      await supabase.from('likes').insert({ 
        post_id: postId, 
        user_id: currentUser.id,
        target_type: 'post',
        target_id: postId
      });
      
      // Update post likes count
      await supabase.rpc('increment_post_likes', { post_id: postId });
      
      // Create notification
      const { data: post } = await supabase.from('posts').select('author_id, title').eq('id', postId).maybeSingle();
      if (post && post.author_id !== currentUser.id) {
        await supabase.from('notifications').insert({
          user_id: post.author_id,
          type: 'like',
          content: `${currentUser.fullname} liked your post: "${post.title.substring(0, 50)}"`,
          reference_id: postId
        });
      }
    }
    renderCurrentView();
  }
  
  // Add Comment
  async function addComment(postId, content, parentId = null) {
    if (!currentUser) {
      showToast('Please login to comment', 'error');
      return;
    }
    
    const { error } = await supabase
      .from('comments')
      .insert({
        post_id: postId,
        user_id: currentUser.id,
        content: sanitizeHTML(content),
        parent_id: parentId
      });
    
    if (!error) {
      await supabase.rpc('increment_post_comments', { post_id: postId });
      
      const { data: post } = await supabase.from('posts').select('author_id, title').eq('id', postId).maybeSingle();
      if (post && post.author_id !== currentUser.id) {
        await supabase.from('notifications').insert({
          user_id: post.author_id,
          type: 'comment',
          content: `${currentUser.fullname} commented on your post: "${post.title.substring(0, 50)}"`,
          reference_id: postId
        });
      }
      showToast('Comment added!');
      renderCurrentView();
    }
  }
  
  // Fetch Posts with filters
  async function fetchPosts(filter = 'all', limit = 20) {
    let query = supabase
      .from('posts')
      .select('*, profiles(fullname, avatar_url, username)')
      .eq('is_draft', false)
      .order('created_at', { ascending: false })
      .limit(limit);
    
    if (filter !== 'all') {
      query = query.eq('category', filter);
    }
    
    const { data, error } = await query;
    if (error) return [];
    return data;
  }
  
  // Update notification badge
  async function updateNotificationBadge() {
    if (!currentUser) return;
    const { count } = await supabase
      .from('notifications')
      .select('*', { count: 'exact', head: true })
      .eq('user_id', currentUser.id)
      .eq('is_read', false);
    
    const badge = document.getElementById('notificationBadge');
    if (count > 0) {
      badge.style.display = 'inline-block';
      badge.textContent = count;
    } else {
      badge.style.display = 'none';
    }
  }
  
  // Subscribe to real-time notifications
  function subscribeToNotifications() {
    if (!currentUser) return;
    if (notificationSubscription) notificationSubscription.unsubscribe();
    
    notificationSubscription = supabase
      .channel(`notifications-${currentUser.id}`)
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'notifications',
        filter: `user_id=eq.${currentUser.id}`
      }, (payload) => {
        updateNotificationBadge();
        showToast('🔔 New notification received!');
      })
      .subscribe();
  }
  
  // UI Rendering
  let currentView = 'home';
  
  function updateAuthUI() {
    const authBtn = document.getElementById('authBtn');
    const dashboardBtn = document.getElementById('dashboardNavBtn');
    if (currentUser) {
      authBtn.innerHTML = `👤 ${currentUser.fullname?.split(' ')[0] || 'Profile'}`;
      dashboardBtn.style.display = 'inline-block';
      subscribeToNotifications();
      updateNotificationBadge();
    } else {
      authBtn.innerHTML = 'Sign In';
      dashboardBtn.style.display = 'none';
    }
  }
  
  function renderMarketing() {
    document.getElementById('marketingSection').innerHTML = `
      <div class="marketing-banner glass-card" style="padding: 32px; margin: 40px 0; text-align: center;">
        <h3 style="font-weight: 800; font-size: 1.5rem;">🚀 Need Professional IT Services?</h3>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 24px 0;">
          <span>🌐 Website Development</span>
          <span>📱 Web Applications</span>
          <span>📲 Mobile Apps</span>
          <span>☁️ Cloud Solutions</span>
          <span>🤖 AI Solutions</span>
          <span>⚙️ Business Automation</span>
        </div>
        <div class="brand-badge" style="display: inline-block; margin: 10px auto; padding: 8px 20px;">✨ Built by Kasturag Tech — Enterprise Solutions ✨</div>
        <p style="margin-top: 20px;">📧 <strong>kasturagtech@gmail.com</strong> | 🌐 <strong>https://kasturagtech.netlify.app</strong></p>
        <button class="btn-primary" style="margin-top: 20px;" onclick="alert('Contact us at kasturagtech@gmail.com for custom solutions!')">Contact Sales →</button>
      </div>
    `;
  }
  
  async function renderHome() {
    const posts = await fetchPosts(currentFilter);
    
    const categoryButtons = `
      <div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0;">
        <button class="filter-btn ${currentFilter === 'all' ? 'btn-primary' : 'btn-outline'}" data-filter="all">📌 All</button>
        <button class="filter-btn ${currentFilter === 'Technology' ? 'btn-primary' : 'btn-outline'}" data-filter="Technology">💻 Technology</button>
        <button class="filter-btn ${currentFilter === 'Startups' ? 'btn-primary' : 'btn-outline'}" data-filter="Startups">🚀 Startups</button>
        <button class="filter-btn ${currentFilter === 'Business Ideas' ? 'btn-primary' : 'btn-outline'}" data-filter="Business Ideas">💡 Business Ideas</button>
        <button class="filter-btn ${currentFilter === 'AI & ML' ? 'btn-primary' : 'btn-outline'}" data-filter="AI & ML">🤖 AI & ML</button>
        <button class="filter-btn ${currentFilter === 'Programming' ? 'btn-primary' : 'btn-outline'}" data-filter="Programming">⌨️ Programming</button>
        <button class="filter-btn ${currentFilter === 'Education' ? 'btn-primary' : 'btn-outline'}" data-filter="Education">📚 Education</button>
        <button class="filter-btn ${currentFilter === 'Career' ? 'btn-primary' : 'btn-outline'}" data-filter="Career">💼 Career</button>
      </div>
    `;
    
    const html = `
      <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin: 24px 0;">
        <div>
          <h1 style="font-size: 2rem; font-weight: 800;">✨ Share Problems & Ideas</h1>
          <p style="color: #666; margin-top: 8px;">Join the conversation, help others, and grow together</p>
        </div>
        <button id="createPostBtn" class="btn-primary" style="font-size: 1.1rem;">➕ Share Problem / Idea</button>
      </div>
      ${categoryButtons}
      <div class="grid-posts" id="postsGrid">
        ${posts.map(post => `
          <div class="post-card glass-card" data-postid="${post.id}">
            <div style="display: flex; gap: 12px; align-items: center; margin-bottom: 16px;">
              <img src="${post.profiles?.avatar_url || `https://ui-avatars.com/api/?background=2D4BFF&color=fff&name=${encodeURIComponent(post.profiles?.fullname || 'User')}`}" class="profile-img">
              <div style="flex: 1;">
                <b>${sanitizeHTML(post.profiles?.fullname || 'Anonymous')}</b>
                <div style="display: flex; gap: 8px; align-items: center; margin-top: 4px;">
                  <span class="category-tag">${post.category}</span>
                  <small>${new Date(post.created_at).toLocaleDateString()}</small>
                </div>
              </div>
              ${currentUser?.is_admin ? `<button class="deletePostBtn" data-id="${post.id}" style="background: none; border: none; color: red; cursor: pointer;">🗑️</button>` : ''}
            </div>
            <h3 style="margin: 12px 0; font-size: 1.2rem;">${sanitizeHTML(post.title)}</h3>
            <p style="color: #4b5563; line-height: 1.5;">${sanitizeHTML(post.content.substring(0, 120))}${post.content.length > 120 ? '...' : ''}</p>
            ${post.images?.length ? `
              <div class="image-preview-grid" style="margin-top: 12px;">
                ${post.images.slice(0, 3).map(img => `<img src="${img}" alt="Post image">`).join('')}
              </div>
            ` : ''}
            <div style="display: flex; gap: 24px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.1);">
              <button class="likeBtn" data-id="${post.id}" style="background: none; border: none; cursor: pointer; display: flex; gap: 6px; align-items: center;">
                ❤️ <span class="like-count">${post.likes_count || 0}</span>
              </button>
              <button class="commentBtn" data-id="${post.id}" style="background: none; border: none; cursor: pointer; display: flex; gap: 6px; align-items: center;">
                💬 <span>${post.comments_count || 0}</span>
              </button>
              <button class="shareBtn" data-id="${post.id}" style="background: none; border: none; cursor: pointer;">📤 Share</button>
            </div>
          </div>
        `).join('') || '<div class="glass-card" style="padding: 60px; text-align: center;"><p style="font-size: 1.2rem;">✨ No posts yet. Be the first to share a problem or idea!</p></div>'}
      </div>
    `;
    
    document.getElementById('mainContent').innerHTML = html;
    
    document.getElementById('createPostBtn')?.addEventListener('click', () => openPostModal());
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        renderHome();
      });
    });
    document.querySelectorAll('.likeBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleLike(btn.dataset.id);
      });
    });
    document.querySelectorAll('.commentBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openCommentModal(btn.dataset.id);
      });
    });
    document.querySelectorAll('.shareBtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(`${window.location.origin}/post/${btn.dataset.id}`);
        showToast('Link copied to clipboard!');
      });
    });
    document.querySelectorAll('.deletePostBtn')?.forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (confirm('Delete this post?')) {
          await supabase.from('posts').delete().eq('id', btn.dataset.id);
          renderHome();
          showToast('Post deleted');
        }
      });
    });
  }
  
  async function openPostModal() {
    if (!currentUser) {
      showToast('Please login to share', 'error');
      openAuthModal();
      return;
    }
    
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content">
        <h2 style="margin-bottom: 20px;">💡 Share Your Problem or Idea</h2>
        <input type="text" id="postTitle" placeholder="Title (e.g., 'Need help with database scaling')">
        <select id="postCategory">
          <option value="Technology">💻 Technology Problem</option>
          <option value="Startups">🚀 Startup Idea</option>
          <option value="Business Ideas">💡 Business Idea</option>
          <option value="AI & ML">🤖 AI/ML Challenge</option>
          <option value="Programming">⌨️ Programming Issue</option>
          <option value="Career">💼 Career Advice</option>
        </select>
        <textarea id="postContent" rows="6" placeholder="Describe your problem or idea in detail..."></textarea>
        <input type="text" id="postTags" placeholder="Tags (comma separated, e.g., 'database, performance')">
        <input type="file" id="postImages" multiple accept="image/*">
        <div id="imagePreview" class="image-preview-grid"></div>
        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button id="submitPostBtn" class="btn-primary">📤 Publish Post</button>
          <button id="closeModalBtn" class="btn-outline">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('postImages').addEventListener('change', (e) => {
      const preview = document.getElementById('imagePreview');
      preview.innerHTML = '';
      Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          preview.innerHTML += `<img src="${ev.target.result}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">`;
        };
        reader.readAsDataURL(file);
      });
    });
    
    document.getElementById('submitPostBtn').onclick = async () => {
      const title = document.getElementById('postTitle').value;
      const content = document.getElementById('postContent').value;
      if (!title || !content) {
        showToast('Please fill in title and content', 'error');
        return;
      }
      
      const images = Array.from(document.getElementById('postImages').files);
      await createPost(
        title,
        content,
        document.getElementById('postCategory').value,
        document.getElementById('postTags').value,
        images
      );
      modal.remove();
      renderHome();
    };
    
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
  }
  
  async function openCommentModal(postId) {
    const { data: comments } = await supabase
      .from('comments')
      .select('*, profiles(fullname, avatar_url)')
      .eq('post_id', postId)
      .is('parent_id', null)
      .order('created_at', { ascending: true });
    
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content" style="max-width: 500px;">
        <h3>💬 Discussion Thread</h3>
        <div id="commentsList" style="max-height: 400px; overflow-y: auto; margin: 20px 0;">
          ${comments?.map(c => `
            <div style="padding: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.03); border-radius: 16px;">
              <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px;">
                <img src="${c.profiles?.avatar_url || `https://ui-avatars.com/api/?background=2D4BFF&color=fff&name=${c.profiles?.fullname}`}" style="width: 32px; height: 32px; border-radius: 50%;">
                <b>${sanitizeHTML(c.profiles?.fullname)}</b>
                <small>${new Date(c.created_at).toLocaleString()}</small>
              </div>
              <p>${sanitizeHTML(c.content)}</p>
            </div>
          `).join('') || '<p>No comments yet. Be the first to reply!</p>'}
        </div>
        <textarea id="commentText" rows="3" placeholder="Write your comment or solution..."></textarea>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
          <button id="submitCommentBtn" class="btn-primary">💬 Post Comment</button>
          <button id="closeModalBtn" class="btn-outline">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('submitCommentBtn').onclick = async () => {
      const text = document.getElementById('commentText').value;
      if (!text) return;
      await addComment(postId, text);
      modal.remove();
      openCommentModal(postId);
    };
    
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
  }
  
  async function renderDashboard() {
    if (!currentUser) {
      renderHome();
      return;
    }
    
    const { data: myPosts } = await supabase
      .from('posts')
      .select('*')
      .eq('author_id', currentUser.id)
      .order('created_at', { ascending: false });
    
    const { data: notifications } = await supabase
      .from('notifications')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false })
      .limit(30);
    
    // Mark notifications as read
    await supabase
      .from('notifications')
      .update({ is_read: true })
      .eq('user_id', currentUser.id)
      .eq('is_read', false);
    updateNotificationBadge();
    
    const html = `
      <div class="glass-card" style="padding: 32px; margin: 24px 0;">
        <div style="display: flex; gap: 24px; flex-wrap: wrap; align-items: center;">
          <img src="${currentUser.avatar_url || `https://ui-avatars.com/api/?background=2D4BFF&color=fff&name=${currentUser.fullname}`}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
          <div style="flex: 1;">
            <h2>${sanitizeHTML(currentUser.fullname)}</h2>
            <p>@${currentUser.username} · Joined ${new Date(currentUser.join_date).toLocaleDateString()}</p>
            <p>${currentUser.bio || 'Passionate about technology and innovation'}</p>
            <button id="editProfileBtn" class="btn-outline" style="margin-top: 12px;">✏️ Edit Profile</button>
          </div>
        </div>
      </div>
      
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 24px 0;">
        <div class="glass-card" style="padding: 20px; text-align: center;">
          <h3>📝 ${myPosts?.length || 0}</h3>
          <p>Posts Created</p>
        </div>
        <div class="glass-card" style="padding: 20px; text-align: center;">
          <h3>❤️ ${myPosts?.reduce((sum, p) => sum + (p.likes_count || 0), 0) || 0}</h3>
          <p>Total Likes Received</p>
        </div>
        <div class="glass-card" style="padding: 20px; text-align: center;">
          <h3>💬 ${myPosts?.reduce((sum, p) => sum + (p.comments_count || 0), 0) || 0}</h3>
          <p>Comments on Your Posts</p>
        </div>
      </div>
      
      <h3>📌 My Posts</h3>
      <div class="grid-posts">
        ${myPosts?.map(p => `
          <div class="post-card glass-card">
            <h4>${sanitizeHTML(p.title)}</h4>
            <p style="color: #666; margin-top: 8px;">${sanitizeHTML(p.content.substring(0, 80))}...</p>
            <div style="display: flex; gap: 16px; margin-top: 12px;">
              <span>❤️ ${p.likes_count || 0}</span>
              <span>💬 ${p.comments_count || 0}</span>
              <small>${new Date(p.created_at).toLocaleDateString()}</small>
            </div>
          </div>
        `).join('') || '<p>No posts yet. Create your first post!</p>'}
      </div>
      
      <h3 style="margin-top: 32px;">🔔 Notifications</h3>
      <div class="glass-card" style="padding: 20px; max-height: 400px; overflow-y: auto;">
        ${notifications?.map(n => `
          <div style="padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1);">
            <small>${new Date(n.created_at).toLocaleString()}</small>
            <p style="margin-top: 4px;">${sanitizeHTML(n.content)}</p>
          </div>
        `).join('') || '<p>No notifications yet</p>'}
      </div>
    `;
    
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('editProfileBtn')?.addEventListener('click', () => openProfileModal());
  }
  
  function openProfileModal() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content">
        <h3>Edit Profile</h3>
        <input id="fullnameEdit" placeholder="Full Name" value="${currentUser.fullname || ''}">
        <input id="usernameEdit" placeholder="Username" value="${currentUser.username || ''}">
        <textarea id="bioEdit" placeholder="Bio" rows="3">${currentUser.bio || ''}</textarea>
        <input id="locationEdit" placeholder="Location" value="${currentUser.location || ''}">
        <input id="websiteEdit" placeholder="Website" value="${currentUser.website || ''}">
        <input type="file" id="avatarUpload" accept="image/*">
        <div style="display: flex; gap: 12px; margin-top: 20px;">
          <button id="saveProfileBtn" class="btn-primary">Save Changes</button>
          <button id="closeModalBtn" class="btn-outline">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('saveProfileBtn').onclick = async () => {
      let avatarUrl = currentUser.avatar_url;
      const avatarFile = document.getElementById('avatarUpload').files[0];
      if (avatarFile) {
        const fileName = `${currentUser.id}/avatar_${Date.now()}.jpg`;
        await supabase.storage.from('avatars').upload(fileName, avatarFile);
        const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(fileName);
        avatarUrl = publicUrl;
      }
      
      await supabase
        .from('profiles')
        .update({
          fullname: document.getElementById('fullnameEdit').value,
          username: document.getElementById('usernameEdit').value,
          bio: document.getElementById('bioEdit').value,
          location: document.getElementById('locationEdit').value,
          website: document.getElementById('websiteEdit').value,
          avatar_url: avatarUrl
        })
        .eq('id', currentUser.id);
      
      await loadUserProfile(currentUser.id);
      modal.remove();
      renderDashboard();
      showToast('Profile updated!');
    };
    
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
  }
  
  function renderAbout() {
    document.getElementById('mainContent').innerHTML = `
      <div class="glass-card" style="padding: 48px; margin: 40px 0;">
        <h1 style="font-size: 2.5rem;">🚀 Kasturag Tech</h1>
        <p style="margin: 24px 0; font-size: 1.1rem; line-height: 1.6;">Kasturag Tech is a cutting-edge software development company specializing in <strong>Web Development, Cloud Solutions, AI, and Digital Transformation</strong>. put idea is our flagship platform fostering tech entrepreneurship and collaboration.</p>
        <div class="brand-badge" style="margin: 20px auto; padding: 12px 24px; text-align: center;">⭐ Platform Developed and Maintained by Kasturag Tech ⭐</div>
        <h3 style="margin-top: 32px;">💼 Need a Website or Software?</h3>
        <p>We build scalable web apps, mobile solutions, business automation, and AI-driven products.</p>
        <button class="btn-primary" style="margin-top: 24px;" onclick="alert('📧 Contact: hello@kasturagtech.com | 🌐 kasturagtech.com')">Contact Us Today</button>
      </div>
    `;
  }
  
  function openAuthModal() {
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.innerHTML = `
      <div class="modal-content">
        <h2 style="margin-bottom: 20px;">Welcome to IdeaHub</h2>
        <div style="display: flex; gap: 12px; margin-bottom: 20px;">
          <button id="showLoginTab" class="btn-primary" style="flex: 1;">Login</button>
          <button id="showSignupTab" class="btn-outline" style="flex: 1;">Sign Up</button>
        </div>
        <div id="authFormContainer">
          <input type="email" id="loginEmail" placeholder="Email">
          <input type="password" id="loginPassword" placeholder="Password">
          <button id="doLoginBtn" class="btn-primary" style="width: 100%; margin-top: 12px;">Login</button>
          <button id="forgotPasswordBtn" style="background: none; border: none; color: #2D4BFF; margin-top: 12px; cursor: pointer;">Forgot Password?</button>
        </div>
        <button id="closeAuthModal" class="btn-outline" style="width: 100%; margin-top: 16px;">Close</button>
      </div>
    `;
    document.body.appendChild(modal);
    
    let currentMode = 'login';
    
    const updateForm = () => {
      const container = document.getElementById('authFormContainer');
      if (currentMode === 'login') {
        container.innerHTML = `
          <input type="email" id="loginEmail" placeholder="Email">
          <input type="password" id="loginPassword" placeholder="Password">
          <button id="doLoginBtn" class="btn-primary" style="width: 100%; margin-top: 12px;">Login</button>
          <button id="forgotPasswordBtn" style="background: none; border: none; color: #2D4BFF; margin-top: 12px; cursor: pointer;">Forgot Password?</button>
        `;
        document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
          try {
            await signIn(
              document.getElementById('loginEmail').value,
              document.getElementById('loginPassword').value
            );
            modal.remove();
            renderHome();
          } catch(e) {
            alert(e.message);
          }
        });
      } else {
        container.innerHTML = `
          <input type="text" id="signupName" placeholder="Full Name">
          <input type="text" id="signupUsername" placeholder="Username">
          <input type="email" id="signupEmail" placeholder="Email">
          <input type="password" id="signupPassword" placeholder="Password">
          <button id="doSignupBtn" class="btn-primary" style="width: 100%; margin-top: 12px;">Create Account</button>
        `;
        document.getElementById('doSignupBtn')?.addEventListener('click', async () => {
          try {
            await signUp(
              document.getElementById('signupEmail').value,
              document.getElementById('signupPassword').value,
              document.getElementById('signupName').value,
              document.getElementById('signupUsername').value
            );
            modal.remove();
          } catch(e) {
            alert(e.message);
          }
        });
      }
    };
    
    document.getElementById('showLoginTab').onclick = () => {
      currentMode = 'login';
      document.getElementById('showLoginTab').className = 'btn-primary';
      document.getElementById('showSignupTab').className = 'btn-outline';
      updateForm();
    };
    
    document.getElementById('showSignupTab').onclick = () => {
      currentMode = 'signup';
      document.getElementById('showSignupTab').className = 'btn-primary';
      document.getElementById('showLoginTab').className = 'btn-outline';
      updateForm();
    };
    
    updateForm();
    document.getElementById('closeAuthModal').onclick = () => modal.remove();
  }
  
  function renderCurrentView() {
    if (currentView === 'home') renderHome();
    else if (currentView === 'about') renderAbout();
    else if (currentView === 'dashboard') renderDashboard();
  }
  
  // Navigation
  document.getElementById('homeNavBtn').addEventListener('click', () => {
    currentView = 'home';
    currentFilter = 'all';
    renderCurrentView();
  });
  
  document.getElementById('problemsNavBtn').addEventListener('click', () => {
    currentView = 'home';
    currentFilter = 'Technology';
    renderCurrentView();
  });
  
  document.getElementById('ideasNavBtn').addEventListener('click', () => {
    currentView = 'home';
    currentFilter = 'Business Ideas';
    renderCurrentView();
  });
  
  document.getElementById('startupsNavBtn').addEventListener('click', () => {
    currentView = 'home';
    currentFilter = 'Startups';
    renderCurrentView();
  });
  
  document.getElementById('techNavBtn').addEventListener('click', () => {
    currentView = 'home';
    currentFilter = 'AI & ML';
    renderCurrentView();
  });
  
  document.getElementById('aboutNavBtn').addEventListener('click', () => {
    currentView = 'about';
    renderCurrentView();
  });
  
  document.getElementById('dashboardNavBtn').addEventListener('click', () => {
    if (currentUser) {
      currentView = 'dashboard';
      renderCurrentView();
    } else {
      openAuthModal();
    }
  });
  
  document.getElementById('authBtn').addEventListener('click', () => {
    if (currentUser) {
      signOut();
    } else {
      openAuthModal();
    }
  });
  
  document.getElementById('notificationsBtn').addEventListener('click', () => {
    if (currentUser) {
      currentView = 'dashboard';
      renderCurrentView();
    } else {
      openAuthModal();
    }
  });
  
  document.getElementById('themeToggleBtn').addEventListener('click', () => {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  });
  
  // Load saved theme
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
  }
  
  // Initialize
  initSupabase();
</script>
</body>
</html>
